<div class="modal" id="editCategoryModal-{{ category[0] }}">
                <form action="{{ url_for('edit_category_route', category_id=category[0]) }}" method="POST">
                    <label>Category Name:</label>
                    <input type="text" name="category_name" value="{{ category[1] }}">
                    <button type="button" onclick="hideModal('editCategoryModal-{{ category[0] }}')">Cancel</button>
                    <button type="submit">Update</button>
                </form>
            </div>
            <div class="modal" id="deleteCategoryModal-{{ category[0] }}">
                <form action="{{ url_for('delete_category_route', category_id=category[0]) }}" method="POST">
                    <p class="delete_message">Are you sure you want to delete Category:{{ category[1] }}</p>
                    <button type="button" onclick="hideModal('deleteCategoryModal-{{ category[0] }}')">No, Go Back</button>
                    <button type="submit">Yes, Delete</button>
                </form>
            </div>
